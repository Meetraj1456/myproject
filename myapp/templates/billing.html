{% extends "index.html" %}
{% load static %}
{% block content %}

<style>
    /* PAGE HEADER STYLING */
    .page-header {
        position: relative;
        padding: 80px 0;
        color: white;
        background: linear-gradient(135deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.3));
    }

    .page-title {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    .page-title span {
        display: block;
        font-size: 0.9rem;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.9;
    }

    .breadcrumb-nav .breadcrumb {
        background: transparent;
        padding: 20px 0 0 0;
    }

    .breadcrumb-item a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .breadcrumb-item a:hover {
        color: #fff;
    }

    .breadcrumb-item.active {
        color: #fff;
    }

    .breadcrumb-item + .breadcrumb-item::before {
        color: rgba(255, 255, 255, 0.6);
    }

    /* PAGE CONTENT */
    .page-content {
        padding: 60px 0;
        background: #f8f9fa;
        min-height: 600px;
    }

    .checkout {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
    }

    .checkout-title {
        font-size: 28px;
        font-weight: 700;
        color: #333;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 3px solid #c96;
        display: inline-block;
    }

    /* FORM STYLING */
    .form-group {
        margin-bottom: 20px;
    }

    .checkout label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
        text-transform: capitalize;
        letter-spacing: 0.5px;
    }

    .checkout .form-control {
        height: 45px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        padding: 10px 15px;
        font-size: 14px;
        transition: all 0.3s ease;
        background-color: #fafafa;
    }

    .checkout .form-control:focus {
        border-color: #c96;
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(201, 102, 0, 0.1);
        outline: none;
    }

    .checkout .form-control::placeholder {
        color: #999;
    }

    .row > div {
        margin-bottom: 20px;
    }

    /* BUTTON STYLING */
    .checkout button[type="submit"] {
        height: 50px;
        background: linear-gradient(135deg, #c96 0%, #b85500 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        box-shadow: 0 4px 15px rgba(201, 102, 0, 0.3);
        margin-top: 20px;
    }

    .checkout button[type="submit"]:hover {
        background: linear-gradient(135deg, #b85500 0%, #a84600 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(201, 102, 0, 0.4);
    }

    .checkout button[type="submit"]:active {
        transform: translateY(0);
        box-shadow: 0 2px 10px rgba(201, 102, 0, 0.3);
    }

    /* FORM LAYOUT */
    .checkout .row {
        margin-right: -10px;
        margin-left: -10px;
    }

    .checkout .row > [class*="col-"] {
        padding-right: 10px;
        padding-left: 10px;
    }

    /* RESPONSIVE DESIGN */
    @media (max-width: 768px) {
        .checkout {
            padding: 25px;
        }

        .page-title {
            font-size: 1.8rem;
        }

        .checkout-title {
            font-size: 22px;
        }

        .page-content {
            padding: 40px 0;
        }
    }

    @media (max-width: 576px) {
        .page-header {
            padding: 50px 0;
        }

        .page-title {
            font-size: 1.4rem;
        }

        .checkout {
            padding: 20px;
            border-radius: 8px;
        }

        .checkout-title {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .checkout .form-control {
            height: 40px;
            font-size: 13px;
        }

        .checkout button[type="submit"] {
            height: 45px;
            font-size: 14px;
        }
    }
</style>

<main class="main">
    <div class="page-header text-center" style="background-image: url('{% static 'images/page-header-bg.jpg' %}'); background-size: cover; background-position: center center;">
        <div class="container">
            <h1 class="page-title">Billing Details<span>Complete Your Information</span></h1>
            <nav aria-label="breadcrumb" class="breadcrumb-nav">
               <ol class="breadcrumb justify-content-center">
                  <li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
                  <li class="breadcrumb-item"><a href="{% url 'cart' %}">Cart</a></li>
                  <li class="breadcrumb-item active">Billing</li>
               </ol>
            </nav>
        </div>
    </div>

    <div class="page-content">
        <div class="checkout">
            <div class="container">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row">
                        <!-- BILLING FORM -->
                        <div class="col-lg-8 offset-lg-2">
                            <h2 class="checkout-title">📋 Billing Address</h2>

                            <!-- NAME ROW -->
                            <div class="row">
                                <div class="col-sm-6 form-group">
                                    <label for="first_name">First Name *</label>
                                    <input type="text" id="first_name" name="first_name" class="form-control" value="{{ address.first_name|default:'' }}" placeholder="Enter your first name" required>
                                </div>

                                <div class="col-sm-6 form-group">
                                    <label for="last_name">Last Name *</label>
                                    <input type="text" id="last_name" name="last_name" class="form-control" value="{{ address.last_name|default:'' }}" placeholder="Enter your last name" required>
                                </div>
                            </div>

                            <!-- EMAIL -->
                            <div class="form-group">
                                <label for="email">Email Address *</label>
                                <input type="email" id="email" name="email" class="form-control" value="{{ address.email|default:'' }}" placeholder="your.email@example.com" required>
                            </div>

                            <!-- ADDRESS -->
                            <div class="form-group">
                                <label for="address">Street Address *</label>
                                <input type="text" id="address" name="address" class="form-control" value="{{ address.address|default:'' }}" placeholder="Enter your full address" required>
                            </div>

                            <!-- COUNTRY & STATE -->
                            <div class="row">
                                <div class="col-sm-6 form-group">
                                    <label for="country">Country *</label>
                                    <input type="text" id="country" name="country" class="form-control" value="{{ address.country|default:'' }}" placeholder="e.g., India" required>
                                </div>

                                <div class="col-sm-6 form-group">
                                    <label for="state">State / Province *</label>
                                    <input type="text" id="state" name="state" class="form-control" value="{{ address.state|default:'' }}" placeholder="e.g., Gujarat" required>
                                </div>
                            </div>

                            <!-- ZIP CODE -->
                            <div class="form-group">
                                <label for="zip_code">ZIP / Postal Code *</label>
                                <input type="number" id="zip_code" name="zip_code" class="form-control" value="{{ address.zip_code|default:'' }}" placeholder="Enter your zip code" required>
                            </div>

                            <!-- SUBMIT BUTTON -->
                            <div class="form-group">
                                <button type="submit" class="btn btn-lg w-100">Continue to Checkout</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

{% endblock %}
