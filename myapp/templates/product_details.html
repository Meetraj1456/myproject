{% extends "index.html" %}
{% load static %}
{% block content %}
        <style>
            /* Product Details Page Styles */
            .product-details-top {
                margin: 2rem 0;
            }
            
            .product-gallery-vertical {
                margin-bottom: 0;
            }
            
            .product-main-image {
                position: relative;
                display: block;
                margin: 0;
                padding: 0;
                background-color: #f5f5f5;
                border-radius: 8px;
                overflow: hidden;
                height: 500px;
                width: 100%;
            }
            
            .product-main-image img {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: contain;
                padding: 1rem;
            }
            
            .btn-product-gallery {
                position: absolute;
                top: 1rem;
                right: 1rem;
                background-color: #fff;
                border: 1px solid #e0e0e0;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #333;
                font-size: 1.4rem;
                transition: all 0.3s ease;
                z-index: 10;
            }
            
            .btn-product-gallery:hover {
                background-color: #c96;
                color: #fff;
                border-color: #c96;
            }
            
            .product-details {
                padding: 2rem 0;
            }
            
            .product-title {
                font-size: 2rem;
                font-weight: 600;
                color: #333;
                margin-bottom: 1.5rem;
                line-height: 1.3;
            }
            
            .ratings-container {
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            
            .ratings {
                width: 100px;
                height: 20px;
                background-color: #f0f0f0;
                border-radius: 3px;
                overflow: hidden;
            }
            
            .ratings-val {
                height: 100%;
                background-color: #ffc107;
            }
            
            .ratings-text {
                color: #666;
                font-size: 1.4rem;
                margin: 0;
                text-decoration: none;
            }
            
            .ratings-text:hover {
                color: #c96;
            }
            
            .product-price {
                font-size: 1.8rem;
                color: #c96;
                font-weight: 600;
                margin-bottom: 2rem;
            }
            
            .product-content {
                color: #666;
                font-size: 1.4rem;
                line-height: 1.6;
                margin-bottom: 2rem;
            }
            
            .product-content p {
                margin: 0;
            }
            
            .product-details-action {
                display: flex;
                align-items: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
            
            .btn-product {
                border: none;
                border-radius: 4px;
                padding: 1rem 2rem;
                font-size: 1.3rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            
            .btn-cart {
                background-color: #c96;
                color: #fff;
                padding: 1.2rem 3rem;
                flex: 1;
                min-width: 200px;
            }
            
            .btn-cart:hover {
                background-color: #b87d3a;
                color: #fff;
                text-decoration: none;
            }
            
            .details-action-wrapper {
                display: flex;
                gap: 0.5rem;
            }
            
            .btn-wishlist {
                background-color: #f5f5f5;
                color: #333;
                border: 1px solid #e0e0e0;
                padding: 1.2rem 2rem;
            }
            
            .btn-wishlist:hover {
                background-color: #c96;
                color: #fff;
                border-color: #c96;
                text-decoration: none;
            }
            
            /* Responsive Design */
            @media (max-width: 1199px) {
                .product-main-image {
                    height: 400px;
                }
                
                .product-title {
                    font-size: 1.8rem;
                }
                
                .product-details {
                    padding: 1.5rem 0;
                }
            }
            
            @media (max-width: 767px) {
                .product-main-image {
                    height: 350px;
                    margin-bottom: 2rem;
                }
                
                .product-title {
                    font-size: 1.6rem;
                }
                
                .product-details-action {
                    flex-direction: column;
                }
                
                .btn-cart,
                .btn-wishlist {
                    width: 100%;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }
                
                .details-action-wrapper {
                    width: 100%;
                }
            }
            
            @media (max-width: 575px) {
                .product-main-image {
                    height: 280px;
                }
                
                .product-title {
                    font-size: 1.4rem;
                }
                
                .product-price {
                    font-size: 1.6rem;
                }
                
                .btn-product {
                    padding: 0.9rem 1.5rem;
                    font-size: 1.2rem;
                }
            }
        </style>
        <main class="main">
            <nav aria-label="breadcrumb" class="breadcrumb-nav border-0 mb-0">
                <div class="container d-flex align-items-center">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
                        <li class="breadcrumb-item"><a href="{% url 'category_market' %}">Products</a></li>
                        <li class="breadcrumb-item active" aria-current="page">{{prid.name}}</li>
                    </ol>
                </div><!-- End .container -->
            </nav><!-- End .breadcrumb-nav -->

            <div class="page-content">
                <div class="container">
                    <div class="product-details-top">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="product-gallery product-gallery-vertical">
                                    <div class="row">
                                        <figure class="product-main-image">
                                            <img id="product-zoom" src="{{prid.img.url}}" data-zoom-image="{{prid.img.url}}" alt="{{prid.name}}">

                                            <a href="#" id="btn-product-gallery" class="btn-product-gallery">
                                                <i class="icon-arrows"></i>
                                            </a>
                                        </figure><!-- End .product-main-image -->
                                    </div><!-- End .row -->
                                </div><!-- End .product-gallery -->
                            </div><!-- End .col-md-6 -->

                            <div class="col-md-6">
                                <div class="product-details">
                                    <h1 class="product-title">{{prid.name}}</h1><!-- End .product-title -->

                                    <div class="ratings-container">
                                        {% comment %} <div class="ratings">
                                            <div class="ratings-val" style="width: 80%;"></div><!-- End .ratings-val -->
                                        </div><!-- End .ratings --> {% endcomment %}
                                        {% comment %} <a class="ratings-text" href="#product-review-link" id="review-link">( 2 Reviews )</a> {% endcomment %}
                                    </div><!-- End .rating-container -->

                                    <div class="product-price">
                                        ₹ {{prid.price}}
                                    </div><!-- End .product-price -->

                                    <div class="product-content">
                                        <p>{{prid.desc}}</p>
                                    </div><!-- End .product-content -->

                                    <div class="product-details-action">
                                        <a href="{% url 'add_to_cart' prid.id%}" class="btn-product btn-cart"><span>add to cart</span></a>

                                        <div class="details-action-wrapper">
                                            <a href="{% url 'add_to_wishlist' prid.id %}" class="btn-product btn-wishlist" title="Wishlist"><span>Add to Wishlist</span></a>
                                        </div><!-- End .details-action-wrapper -->
                                    </div><!-- End .product-details-action -->
                                </div><!-- End .product-details -->
                            </div><!-- End .col-md-6 -->
                        </div><!-- End .row -->
                    </div><!-- End .product-details-top -->
                </div><!-- End .container -->
            </div><!-- End .page-content -->
        </main><!-- End .main -->
{% endblock %}
